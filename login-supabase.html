<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CMS Login</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121315; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1c1d1f; padding: 40px; border-radius: 8px; width: 100%; max-width: 380px; border: 1px solid #2a2b2d; text-align: center; }
        .logo { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 30px; color: #d0aa69; font-family: 'Playfair Display', serif; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: #a0a0a0; }
        input { width: 100%; padding: 12px; background: #121315; border: 1px solid #333; border-radius: 4px; color: #fff; box-sizing: border-box; }
        input:focus { border-color: #d0aa69; outline: none; }
        .btn { background: #d0aa69; color: #121315; border: none; padding: 14px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .btn:hover { background: #b89254; }
        #error-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">NEXUS</div>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <button type="button" class="btn" id="register-btn" style="background: transparent; border: 1px solid #d0aa69; color: #d0aa69; margin-top: 10px;">Register</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm'
        
        const supabaseUrl = 'https://dmlrpjtjabanopetnnqt.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbHJwanRqYWJhbm9wZXRubnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODIwNTQsImV4cCI6MjA5NjY1ODA1NH0.bWRcw7zITcBU5sWGmF7BZMAS6khO8H_vXbehUoeSZHU'
        const supabase = createClient(supabaseUrl, supabaseKey)

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('username').value,
                password: document.getElementById('password').value
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                window.location.href = '/admin-supabase.html';
            }
        });

        document.getElementById('register-btn').addEventListener('click', async function() {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            const { data, error } = await supabase.auth.signUp({
                email: document.getElementById('username').value,
                password: document.getElementById('password').value
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                errorMsg.style.color = "#e74c3c";
            } else {
                errorMsg.textContent = "Registration successful! You can now log in.";
                errorMsg.style.display = 'block';
                errorMsg.style.color = "green";
            }
        });
    </script>
</body>
</html>
